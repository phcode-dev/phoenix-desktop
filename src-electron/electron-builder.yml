appId: io.phcode.dev
productName: phoenix-code-experimental-build
copyright: Copyright © 2024 phcode.dev

asar: true

linux:
  target:
    - AppImage
  category: Development
  icon: ../src-tauri/icons

files:
  - "**/*"
  - "!dist/**"
  - "!src-node/**"
  - "!bin/**"
  - "!phoenix-dist/**"

asarUnpack:
  - "node_modules/keytar/**"

extraResources:
  - from: "src-node"
    to: "src-node"
  - from: "bin"
    to: "bin"
  - from: "phoenix-dist"
    to: "phoenix-dist"
  - from: "../src-tauri/icons/icon.png"
    to: "icon.png"

extraMetadata:
  main: main.js

publish: null
